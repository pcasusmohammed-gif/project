name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          # The --assets flag tells Flet where your audio/images are
          flet build apk --assets assets

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MED-AUDIO-PRO-APK
          path: build/apk/*.apk
